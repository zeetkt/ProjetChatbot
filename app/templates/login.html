<!--
  Page de connexion du chatbot.

  Affiche un formulaire simple avec un champ mot de passe.
  Le style est minimaliste et centre (classe .login-body).
  En cas d'erreur, le message {{ error }} est affiché en rouge.

  Variables Jinja2 attendues :
    - request : objet Request (obligatoire pour Jinja2)
    - error : message d'erreur (None si pas d'erreur)
-->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Chatbot Ecole</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .theme-btn { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:16px; transition:background .2s; }
    .theme-btn:hover { background:rgba(255,255,255,0.2); }
  </style>
</head>
<body class="login-body">
  <button class="theme-btn" id="theme-btn" title="Changer le theme">🌙</button>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <!-- Emoji livre en guise de logo -->
        <div class="logo">📚</div>
        <h1>Chatbot Ecole</h1>
        <p>Assistant pedagogique</p>
      </div>

      <!--
        Formulaire POST vers /login.
        Le champ "password" est recupere par le routeur auth_router.py
        via Form(...) dans la fonction login_post().
      -->
      <form method="post" action="/login">
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password"
                 placeholder="Entrez le mot de passe" required autofocus>
        </div>

        <!-- Affichage conditionnel d'une erreur (mot de passe incorrect) -->
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <button type="submit" class="btn-primary">Se connecter</button>
      </form>
    </div>
  </div>

  <script>
    (function() {
      const btn = document.getElementById('theme-btn');
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      if (btn) {
        btn.textContent = saved === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', function() {
          const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
          if (isDark) {
            document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', 'light');
            btn.textContent = '🌙';
          } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            btn.textContent = '☀️';
          }
        });
      }
    })();
  </script>
</body>
</html>
